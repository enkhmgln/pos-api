# Copy to server: sudo cp deploy/pos.nexusinfinity.conf /etc/nginx/sites-available/
# Enable: sudo ln -sf /etc/nginx/sites-available/pos.nexusinfinity.conf /etc/nginx/sites-enabled/
# Test: sudo nginx -t && sudo systemctl reload nginx
upstream pos_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name pos.nexusinfinity.mn;

    location / {
        proxy_pass http://pos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pos.nexusinfinity.mn;

    ssl_certificate /etc/ssl/certs/cloudflare-nexus.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-nexus.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://pos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
