name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run app:build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            if [ -d /mnt/webapps/pos-api ]; then
              cd /mnt/webapps/pos-api
              git pull https://${{ secrets.DEPLOY_TOKEN }}@github.com/enkhmgln/pos-api.git main
            else
              cd /mnt/webapps
              git clone https://${{ secrets.DEPLOY_TOKEN }}@github.com/enkhmgln/pos-api.git pos-api
              cd pos-api
            fi
            bun install --frozen-lockfile
            bun run app:build
            bun run db:migrate || true
            pm2 restart pos-api || pm2 start dist/server.js --name pos-api --interpreter bun
